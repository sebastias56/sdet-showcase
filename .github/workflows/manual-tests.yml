name: Manual Tests

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite to run
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
      browser:
        description: Browser to run
        required: true
        default: chrome
        type: choice
        options:
          - chrome
          - firefox
          - all

jobs:
  test:
    name: Manual Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout repository
        if: github.event.inputs.browser == 'all' || github.event.inputs.browser == matrix.browser
        uses: actions/checkout@v4

      - name: Set up Java 17
        if: github.event.inputs.browser == 'all' || github.event.inputs.browser == matrix.browser
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run smoke tests on ${{ matrix.browser }}
        if: github.event.inputs.suite == 'smoke' && (github.event.inputs.browser == 'all' || github.event.inputs.browser == matrix.browser)
        run: mvn clean test -Dgroups=smoke -Dbrowser=${{ matrix.browser }} -Dheadless=true

      - name: Run full suite on ${{ matrix.browser }}
        if: github.event.inputs.suite == 'full' && (github.event.inputs.browser == 'all' || github.event.inputs.browser == matrix.browser)
        run: mvn clean test -Dbrowser=${{ matrix.browser }} -Dheadless=true

      - name: Upload Surefire reports
        if: always() && (github.event.inputs.browser == 'all' || github.event.inputs.browser == matrix.browser)
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.browser }}
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload screenshots
        if: failure() && (github.event.inputs.browser == 'all' || github.event.inputs.browser == matrix.browser)
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: target/screenshots/
          if-no-files-found: ignore
