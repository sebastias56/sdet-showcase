name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Maven Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run smoke tests on ${{ matrix.browser }}
        if: github.event_name == 'pull_request'
        run: mvn clean test -Dgroups=smoke -Dbrowser=${{ matrix.browser }} -Dheadless=true

      - name: Run full suite on ${{ matrix.browser }}
        if: github.event_name == 'push'
        run: mvn clean test -Dbrowser=${{ matrix.browser }} -Dheadless=true

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: target/screenshots/
          if-no-files-found: ignore
